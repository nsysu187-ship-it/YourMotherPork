<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>綠茶打100隻噴火龍沒掉技能書</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F5F0;--card:#fff;--border:#E2DDD5;--text:#1a1a1a;--muted:#999;
  --b-l:#E6F1FB;--b-m:#378ADD;--b-d:#185FA5;--b-t:#0C447C;
  --c-l:#FAECE7;--c-m:#D85A30;--c-d:#993C1D;--c-t:#712B13;
  --g-l:#EAF3DE;--g-m:#639922;--g-d:#3B6D11;--g-t:#27500A;
  --p-l:#EEEDFE;--p-m:#7F77DD;--p-d:#534AB7;--p-t:#3C3489;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px;}
h1{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;letter-spacing:.05em;text-align:center;margin-bottom:4px;}
.subtitle{text-align:center;font-size:12px;color:var(--muted);margin-bottom:24px;}
.screen{max-width:400px;margin:0 auto;display:none;}
.screen.active{display:block;}
#screen-game{max-width:600px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;margin-bottom:16px;}
.card h2{font-size:15px;font-weight:700;margin-bottom:4px;}
.card p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;}
input[type=text]{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);outline:none;letter-spacing:.1em;}
input[type=text]:focus{border-color:#aaa;}
.code-input{font-family:'Space Mono',monospace !important;font-size:22px !important;text-align:center;letter-spacing:.2em !important;}
.btn{width:100%;padding:11px 0;border-radius:10px;border:none;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;margin-top:10px;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--text);color:#fff;}
.btn-primary:hover{opacity:.85;}
.btn-secondary{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-secondary:hover{background:var(--bg);}
.divider{text-align:center;font-size:12px;color:var(--muted);margin:12px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
.room-code-box{background:var(--bg);border:1.5px dashed var(--border);border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;}
.room-code-box .code{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;letter-spacing:.15em;}
.room-code-box .hint{font-size:11px;color:var(--muted);margin-top:4px;}
.seats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.seat-btn{padding:14px 0;border-radius:12px;border:2px solid transparent;font-family:'Noto Sans TC',sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .2s;text-align:center;}
.seat-btn:active{transform:scale(.95);}
.seat-btn.taken{opacity:.3;cursor:not-allowed;}
.seat-btn.taken::after{content:'已有人';font-size:10px;display:block;font-weight:400;margin-top:2px;}
.seat-0{background:var(--b-l);border-color:var(--b-m);color:var(--b-t);}
.seat-1{background:var(--c-l);border-color:var(--c-m);color:var(--c-t);}
.seat-2{background:var(--g-l);border-color:var(--g-m);color:var(--g-t);}
.seat-3{background:var(--p-l);border-color:var(--p-m);color:var(--p-t);}
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;}
.my-tag{font-weight:700;font-size:13px;padding:4px 12px;border-radius:6px;}
.my-tag-0{background:var(--b-l);color:var(--b-t);}
.my-tag-1{background:var(--c-l);color:var(--c-t);}
.my-tag-2{background:var(--g-l);color:var(--g-t);}
.my-tag-3{background:var(--p-l);color:var(--p-t);}
.dots{display:flex;gap:6px;align-items:center;}
.dot{width:8px;height:8px;border-radius:50%;opacity:.2;transition:opacity .3s;}
.dot.on{opacity:1;}
.dot-0{background:var(--b-m);}.dot-1{background:var(--c-m);}.dot-2{background:var(--g-m);}.dot-3{background:var(--p-m);}
.prog{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);}
.leave-btn{font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;}
.leave-btn:hover{background:var(--bg);}
.col-headers{display:grid;grid-template-columns:28px repeat(4,1fr);gap:5px;margin-bottom:6px;}
.col-h{text-align:center;font-size:12px;font-weight:700;padding:6px 0;border-radius:8px;}
.col-h.mine{border:2px solid;}
.col-h-0{background:var(--b-l);color:var(--b-t);}.col-h-0.mine{border-color:var(--b-m);}
.col-h-1{background:var(--c-l);color:var(--c-t);}.col-h-1.mine{border-color:var(--c-m);}
.col-h-2{background:var(--g-l);color:var(--g-t);}.col-h-2.mine{border-color:var(--g-m);}
.col-h-3{background:var(--p-l);color:var(--p-t);}.col-h-3.mine{border-color:var(--p-m);}
.floor-table{display:flex;flex-direction:column;gap:5px;}
.floor-row{display:grid;grid-template-columns:28px repeat(4,1fr);gap:5px;align-items:center;}
.floor-row.done-row{opacity:.45;}
.floor-num{text-align:center;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
.room-cell{display:flex;gap:3px;}
.plat-btn{flex:1;padding:8px 0;border-radius:7px;border:1.5px solid transparent;font-size:13px;font-weight:700;font-family:'Space Mono',monospace;cursor:pointer;text-align:center;transition:transform .1s,opacity .15s;user-select:none;}
.plat-btn:active{transform:scale(.93);}
.room-cell-0 .plat-btn{background:var(--b-l);border-color:#B5D4F4;color:var(--b-d);}
.room-cell-1 .plat-btn{background:var(--c-l);border-color:#F5C4B3;color:var(--c-d);}
.room-cell-2 .plat-btn{background:var(--g-l);border-color:#C0DD97;color:var(--g-d);}
.room-cell-3 .plat-btn{background:var(--p-l);border-color:#CECBF6;color:var(--p-d);}
.room-cell-0 .plat-btn.correct{background:var(--b-m);border-color:var(--b-d);color:#fff;}
.room-cell-1 .plat-btn.correct{background:var(--c-m);border-color:var(--c-d);color:#fff;}
.room-cell-2 .plat-btn.correct{background:var(--g-m);border-color:var(--g-d);color:#fff;}
.room-cell-3 .plat-btn.correct{background:var(--p-m);border-color:var(--p-d);color:#fff;}
.plat-btn.elim{opacity:.18;cursor:default;}
.plat-btn.elim:active{transform:none;}
.not-mine .plat-btn{cursor:default;}
.not-mine .plat-btn:active{transform:none;}
.bottom-bar{display:flex;gap:8px;margin-top:14px;}
.bottom-bar button{flex:1;padding:9px 0;border-radius:10px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--muted);font-family:'Noto Sans TC',sans-serif;cursor:pointer;}
.bottom-bar button:hover{background:var(--card);color:var(--text);}
.err{color:#D85A30;font-size:12px;margin-top:6px;min-height:18px;text-align:center;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:transform .3s,opacity .3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<h1>第六關踏板</h1>
<p class="subtitle">在嚕旁邊衝卷要小心<br>拿到黑傘的BlackTea 拿到了綠傘💯<br>狗哥欠大家三件套</p>


<!-- 首頁 -->
<div class="screen active" id="screen-home">
  <div class="card">
    <h2>建立新房間</h2>
    <p>把代碼傳給隊友加入。<br>房主，關閉頁面後 房間會自動解散喔。</p>
    <button class="btn btn-primary" onclick="createRoom()">建立房間</button>
  </div>
  <div class="divider">或</div>
  <div class="card">
    <h2>加入房間</h2>
    <p>輸入隊友給你的四位代碼。</p>
    <input type="text" class="code-input" id="join-code" maxlength="4" placeholder="XXXX" oninput="this.value=this.value.toUpperCase()">
    <div class="err" id="join-err"></div>
    <button class="btn btn-secondary" onclick="joinRoom()">加入</button>
  </div>
</div>

<!-- 選座位 -->
<div class="screen" id="screen-seat">
  <div class="card">
    <h2>選擇你的房間</h2>
    <p id="seat-hint" style="margin-bottom:12px;"></p>
    <div class="seats">
      <button class="seat-btn seat-0" id="sb-0" onclick="takeSeat(0)">藍色</button>
      <button class="seat-btn seat-1" id="sb-1" onclick="takeSeat(1)">橘色</button>
      <button class="seat-btn seat-2" id="sb-2" onclick="takeSeat(2)">綠色</button>
      <button class="seat-btn seat-3" id="sb-3" onclick="takeSeat(3)">紫色</button>
    </div>
    <button class="btn btn-secondary" style="margin-top:14px;" onclick="goHome()">返回</button>
  </div>
</div>

<!-- 遊戲 -->
<div class="screen" id="screen-game">
  <div class="status-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="my-tag" class="my-tag"></span>
      <div class="dots">
        <div class="dot dot-0" id="dot-0"></div>
        <div class="dot dot-1" id="dot-1"></div>
        <div class="dot dot-2" id="dot-2"></div>
        <div class="dot dot-3" id="dot-3"></div>
      </div>
    </div>
    <span class="prog" id="prog">0/10</span>
    <button class="leave-btn" onclick="leaveGame()">離開</button>
  </div>
  <div class="col-headers">
    <div></div>
    <div class="col-h col-h-0" id="col-h-0">藍色</div>
    <div class="col-h col-h-1" id="col-h-1">橘色</div>
    <div class="col-h col-h-2" id="col-h-2">綠色</div>
    <div class="col-h col-h-3" id="col-h-3">紫色</div>
  </div>
  <div class="floor-table" id="floor-table"></div>
  <div class="bottom-bar">
    <button onclick="confirmReset()">重置樓層（下一場）</button>
    <button onclick="copyCode()">複製房間代碼</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, onDisconnect, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXHe3XoVjq56zVzBQVMb-a0pxrIT472iw",
  authDomain: "yourmotherpork-a0d57.firebaseapp.com",
  databaseURL: "https://yourmotherpork-a0d57-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yourmotherpork-a0d57",
  storageBucket: "yourmotherpork-a0d57.firebasestorage.app",
  messagingSenderId: "745700518720",
  appId: "1:745700518720:web:e910627e5a8c87a9e4e8a5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const FLOORS = 10;
const roomNames = ['藍色','橘色','綠色','紫色'];
let myRoom = null;
let roomCode = null;
let isHost = false;
let unsubscribe = null;
let correct = Array.from({length:FLOORS},()=>Array(4).fill(null));
let online = Array(4).fill(false);

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
}
function randCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:4},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}
function updateSeatButtons(onlineArr) {
  for (let r=0;r<4;r++) {
    const btn = document.getElementById('sb-'+r);
    if (onlineArr[r]) { btn.classList.add('taken'); btn.disabled=true; }
    else { btn.classList.remove('taken'); btn.disabled=false; }
  }
}

window.createRoom = async function() {
  let code;
  for (let i=0;i<10;i++) {
    code = randCode();
    const snap = await get(ref(db,`rooms/${code}`));
    if (!snap.exists()) break;
  }
  roomCode = code;
  isHost = true;
  await set(ref(db,`rooms/${code}`), { createdAt: serverTimestamp(), online:[false,false,false,false], floors:null });
  document.getElementById('seat-hint').innerHTML =
    `房間代碼：<b style="font-family:monospace;font-size:16px;letter-spacing:.1em;color:var(--text)">${code}</b><br><span style="font-size:11px;color:var(--muted)">選好座位後再把代碼傳給隊友</span>`;
  updateSeatButtons([false,false,false,false]);
  showScreen('screen-seat');
}

window.joinRoom = async function() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const errEl = document.getElementById('join-err');
  errEl.textContent = '';
  if (code.length !== 4) { errEl.textContent = '請輸入四位代碼'; return; }
  const snap = await get(ref(db,`rooms/${code}`));
  if (!snap.exists()) { errEl.textContent = '找不到這個房間，確認代碼是否正確'; return; }
  roomCode = code;
  isHost = false;
  const data = snap.val();
  const onlineArr = data.online || [false,false,false,false];
  document.getElementById('seat-hint').innerHTML =
    `加入房間：<b style="font-family:monospace;font-size:16px;letter-spacing:.1em;color:var(--text)">${code}</b>`;
  updateSeatButtons(onlineArr);
  showScreen('screen-seat');
}

window.takeSeat = async function(r) {
  const snap = await get(ref(db,`rooms/${roomCode}/online/${r}`));
  if (snap.val()) { showToast('剛剛被人搶走了！'); return; }
  myRoom = r;

  const onlineRef = ref(db,`rooms/${roomCode}/online/${r}`);
  await set(onlineRef, true);
  onDisconnect(onlineRef).set(false);

  if (isHost) {
    onDisconnect(ref(db,`rooms/${roomCode}`)).remove();
  }

  unsubscribe = onValue(ref(db,`rooms/${roomCode}`), snap => {
    const data = snap.val();
    if (!data) { showToast('房主關閉了房間'); goHome(); return; }
    for (let f=0;f<FLOORS;f++)
      for (let s=0;s<4;s++)
        correct[f][s] = (data.floors&&data.floors[f]&&data.floors[f][s]!=null) ? data.floors[f][s] : null;
    for (let s=0;s<4;s++) online[s] = !!(data.online&&data.online[s]);
    renderGame();
    updateSeatButtons(online);
  });

  const tag = document.getElementById('my-tag');
  tag.textContent = '我是 '+roomNames[r];
  tag.className = 'my-tag my-tag-'+r;
  document.getElementById('col-h-'+r).classList.add('mine');
  showScreen('screen-game');
}

window.leaveGame = async function() {
  if (unsubscribe) { unsubscribe(); unsubscribe=null; }
  if (myRoom !== null) {
    const onlineRef = ref(db,`rooms/${roomCode}/online/${myRoom}`);
    await onDisconnect(onlineRef).cancel();
    await set(onlineRef, false);
  }
  if (isHost) await remove(ref(db,`rooms/${roomCode}`));
  resetState();
  goHome();
}

window.goHome = function() {
  resetState();
  document.getElementById('join-code').value = '';
  document.getElementById('join-err').textContent = '';
  showScreen('screen-home');
}

function resetState() {
  myRoom=null; roomCode=null; isHost=false;
  correct=Array.from({length:FLOORS},()=>Array(4).fill(null));
  online=Array(4).fill(false);
  for (let r=0;r<4;r++) document.getElementById('col-h-'+r).classList.remove('mine');
}

window.handleClick = function(f,r,n) {
  if (r!==myRoom) return;
  const newVal = correct[f][r]===n ? null : n;
  set(ref(db,`rooms/${roomCode}/floors/${f}/${r}`), newVal);
}

window.confirmReset = function() {
  if (!confirm('重置所有樓層？（全員共用）')) return;
  set(ref(db,`rooms/${roomCode}/floors`), null);
  showToast('已重置！');
}

window.copyCode = function() {
  navigator.clipboard.writeText(roomCode).then(()=>showToast('代碼已複製：'+roomCode));
}

function renderGame() {
  for (let r=0;r<4;r++) {
    const dot = document.getElementById('dot-'+r);
    online[r] ? dot.classList.add('on') : dot.classList.remove('on');
  }
  let done = correct.filter(row=>row.every(v=>v!==null)).length;
  document.getElementById('prog').textContent = done+'/10';

  const table = document.getElementById('floor-table');
  table.innerHTML='';
  for (let f=0;f<FLOORS;f++) {
    const used = new Set(correct[f].filter(v=>v!==null));
    const allDone = correct[f].every(v=>v!==null);
    const row = document.createElement('div');
    row.className='floor-row'+(allDone?' done-row':'');
    const lbl = document.createElement('div');
    lbl.className='floor-num';
    lbl.textContent=(f+1)+'F';
    row.appendChild(lbl);
    for (let r=0;r<4;r++) {
      const cell = document.createElement('div');
      cell.className='room-cell room-cell-'+r+(r!==myRoom?' not-mine':'');
      for (let n=1;n<=4;n++) {
        const btn = document.createElement('button');
        btn.className='plat-btn';
        btn.textContent=n;
        if (correct[f][r]===n) btn.classList.add('correct');
        else if (correct[f][r]!==null||used.has(n)) btn.classList.add('elim');
        if (r===myRoom) {
          btn.addEventListener('click',()=>{
            if (!btn.classList.contains('elim')||correct[f][r]===n) handleClick(f,r,n);
          });
        }
        cell.appendChild(btn);
      }
      row.appendChild(cell);
    }
    table.appendChild(row);
  }
}
</script>
</body>
</html>
