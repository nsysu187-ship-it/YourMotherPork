<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>綠茶打100隻噴火龍沒掉技能書</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F5F0;--card:#fff;--border:#E2DDD5;--text:#1a1a1a;--muted:#999;
  --b-l:#E6F1FB;--b-m:#378ADD;--b-d:#185FA5;--b-t:#0C447C;
  --c-l:#FAECE7;--c-m:#D85A30;--c-d:#993C1D;--c-t:#712B13;
  --g-l:#EAF3DE;--g-m:#639922;--g-d:#3B6D11;--g-t:#27500A;
  --p-l:#EEEDFE;--p-m:#7F77DD;--p-d:#534AB7;--p-t:#3C3489;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px;}
h1{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;letter-spacing:.05em;text-align:center;margin-bottom:4px;}
.subtitle{text-align:center;font-size:12px;color:var(--muted);margin-bottom:24px;}
.screen{max-width:400px;margin:0 auto;display:none;}
.screen.active{display:block;}
#screen-game{max-width:600px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;margin-bottom:16px;}
.card h2{font-size:15px;font-weight:700;margin-bottom:4px;}
.card p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;}
input[type=text]{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);outline:none;letter-spacing:.1em;}
input[type=text]:focus{border-color:#aaa;}
.code-input{font-family:'Space Mono',monospace !important;font-size:22px !important;text-align:center;letter-spacing:.2em !important;}
.btn{width:100%;padding:11px 0;border-radius:10px;border:none;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;margin-top:10px;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--text);color:#fff;}
.btn-primary:hover{opacity:.85;}
.btn-secondary{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-secondary:hover{background:var(--bg);}
.divider{text-align:center;font-size:12px;color:var(--muted);margin:12px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
.room-code-box{background:var(--bg);border:1.5px dashed var(--border);border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;}
.room-code-box .code{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;letter-spacing:.15em;}
.room-code-box .hint{font-size:11px;color:var(--muted);margin-top:4px;}
.seats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.seat-btn{padding:14px 0;border-radius:12px;border:2px solid transparent;font-family:'Noto Sans TC',sans-serif;font-size:22px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .2s;text-align:center;}
.seat-btn:active{transform:scale(.95);}
.seat-btn.taken{opacity:.3;cursor:not-allowed;}
.seat-btn.taken::after{content:'已有人';font-size:10px;display:block;font-weight:400;margin-top:2px;}
.seat-0{background:var(--b-l);border-color:var(--b-m);color:var(--b-t);}
.seat-1{background:var(--c-l);border-color:var(--c-m);color:var(--c-t);}
.seat-2{background:var(--g-l);border-color:var(--g-m);color:var(--g-t);}
.seat-3{background:var(--p-l);border-color:var(--p-m);color:var(--p-t);}
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;}
.my-tag{font-weight:700;font-size:13px;padding:4px 12px;border-radius:6px;}
.my-tag-0{background:var(--b-l);color:var(--b-t);}
.my-tag-1{background:var(--c-l);color:var(--c-t);}
.my-tag-2{background:var(--g-l);color:var(--g-t);}
.my-tag-3{background:var(--p-l);color:var(--p-t);}
.dots{display:flex;gap:6px;align-items:center;}
.dot{width:8px;height:8px;border-radius:50%;opacity:.2;transition:opacity .3s;}
.dot.on{opacity:1;}
.dot-0{background:var(--b-m);}.dot-1{background:var(--c-m);}.dot-2{background:var(--g-m);}.dot-3{background:var(--p-m);}
.prog{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);}
.leave-btn{font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;}
.leave-btn:hover{background:var(--bg);}
.col-headers{display:grid;grid-template-columns:28px repeat(4,1fr);gap:5px;margin-bottom:6px;transition:grid-template-columns .3s;}
.col-h{text-align:center;font-size:12px;font-weight:700;padding:6px 0;border-radius:8px;}
.col-h.mine{border:2px solid;}
.col-h-0{background:var(--b-l);color:var(--b-t);}.col-h-0.mine{border-color:var(--b-m);}
.col-h-1{background:var(--c-l);color:var(--c-t);}.col-h-1.mine{border-color:var(--c-m);}
.col-h-2{background:var(--g-l);color:var(--g-t);}.col-h-2.mine{border-color:var(--g-m);}
.col-h-3{background:var(--p-l);color:var(--p-t);}.col-h-3.mine{border-color:var(--p-m);}
.floor-table{display:flex;flex-direction:column;gap:5px;}
.floor-row{display:grid;grid-template-columns:28px repeat(4,1fr);gap:5px;align-items:center;transition:grid-template-columns .3s;}
.floor-row.done-row{opacity:.45;}
.floor-num{text-align:center;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
.room-cell{display:flex;gap:3px;}
.plat-btn{flex:1;padding:8px 0;border-radius:7px;border:1.5px solid transparent;font-size:13px;font-weight:700;font-family:'Space Mono',monospace;cursor:pointer;text-align:center;transition:transform .1s,opacity .15s;user-select:none;}
.plat-btn:active{transform:scale(.93);}
.room-cell-0 .plat-btn{background:var(--b-l);border-color:#B5D4F4;color:var(--b-d);}
.room-cell-1 .plat-btn{background:var(--c-l);border-color:#F5C4B3;color:var(--c-d);}
.room-cell-2 .plat-btn{background:var(--g-l);border-color:#C0DD97;color:var(--g-d);}
.room-cell-3 .plat-btn{background:var(--p-l);border-color:#CECBF6;color:var(--p-d);}
.room-cell-0 .plat-btn.correct{background:var(--b-m);border-color:var(--b-d);color:#fff;}
.room-cell-1 .plat-btn.correct{background:var(--c-m);border-color:var(--c-d);color:#fff;}
.room-cell-2 .plat-btn.correct{background:var(--g-m);border-color:var(--g-d);color:#fff;}
.room-cell-3 .plat-btn.correct{background:var(--p-m);border-color:var(--p-d);color:#fff;}
.plat-btn.elim{opacity:.18;cursor:default;}
.plat-btn.elim:active{transform:none;}
.not-mine .plat-btn{cursor:default;}
.not-mine .plat-btn:active{transform:none;}
/* 非自己的欄縮小顯示 */
.plat-btn.small-mode{font-size:10px;padding:5px 0;}
.col-h.small-mode{font-size:10px;padding:4px 2px;}
.bottom-bar{display:flex;gap:8px;margin-top:14px;}
.bottom-bar button{flex:1;padding:9px 0;border-radius:10px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--muted);font-family:'Noto Sans TC',sans-serif;cursor:pointer;}
.bottom-bar button:hover{background:var(--card);color:var(--text);}
.err{color:#D85A30;font-size:12px;margin-top:6px;min-height:18px;text-align:center;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:transform .3s,opacity .3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ===== 留言系統 ===== */
.review-wrap{max-width:400px;margin:0 auto 24px;}
.btn-discord{width:100%;padding:11px 0;border-radius:10px;border:none;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;background:#5865F2;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;}
.btn-discord:hover{opacity:.85;}
.btn-discord svg{width:20px;height:20px;flex-shrink:0;}
.discord-user{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px;}
.discord-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;}
.discord-avatar-placeholder{width:36px;height:36px;border-radius:50%;background:#5865F2;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0;}
.discord-info{flex:1;min-width:0;}
.discord-name{font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.discord-tag{font-size:11px;color:var(--muted);}
.discord-logout{font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;flex-shrink:0;}
.discord-logout:hover{background:var(--bg);}
.star-input{display:flex;gap:4px;margin-bottom:14px;flex-direction:row-reverse;justify-content:flex-end;}
.star-input input{display:none;}
.star-input label{font-size:30px;cursor:pointer;color:#ddd;transition:color .1s;line-height:1;}
.star-input label:hover,.star-input label:hover~label,.star-input input:checked~label{color:#F5A623;}
.review-list{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.review-item{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.review-item .rev-header{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.review-item .rev-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.review-item .rev-avatar-placeholder{width:28px;height:28px;border-radius:50%;background:#5865F2;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;}
.review-item .rev-name{font-weight:700;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.review-item .rev-stars{color:#F5A623;font-size:13px;letter-spacing:1px;flex-shrink:0;}
.review-item .rev-text{font-size:13px;color:#444;line-height:1.6;}
.review-item .rev-time{font-size:10px;color:var(--muted);margin-top:4px;}
.rev-avg{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.rev-avg .big-stars{font-size:18px;color:#F5A623;}
.rev-avg .avg-num{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;}
.rev-avg .rev-count{font-size:12px;color:var(--muted);}
.rev-empty{font-size:13px;color:var(--muted);text-align:center;padding:14px 0;}
</style>
</head>
<body>

<h1>第六關踏板</h1>
<p class="subtitle">在嚕旁邊衝卷要小心<br>拿到黑傘的BlackTea 拿到了綠傘💯<br>狗哥欠大家三件套</p>


<!-- 首頁 -->
<div class="screen active" id="screen-home">
  <div class="card">
    <h2>建立新房間</h2>
    <p>把代碼傳給隊友加入。<br>房主，關閉頁面後 房間會自動解散喔。</p>
    <button class="btn btn-primary" onclick="createRoom()">建立房間</button>
  </div>
  <div class="divider">或</div>
  <div class="card">
    <h2>加入房間</h2>
    <p>輸入隊友給你的四位代碼。</p>
    <input type="text" class="code-input" id="join-code" maxlength="4" placeholder="XXXX" oninput="this.value=this.value.toUpperCase()">
    <div class="err" id="join-err"></div>
    <button class="btn btn-secondary" onclick="joinRoom()">加入</button>
  </div>
</div>

<!-- 留言系統 -->
<div class="review-wrap" id="review-wrap">
  <div class="card">
    <h2>留言板</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;">用DC官網登入可以留下留言</p>
    <div class="rev-avg" id="rev-avg" style="display:none;">
      <div class="big-stars" id="rev-avg-stars"></div>
      <div class="avg-num" id="rev-avg-num"></div>
      <div class="rev-count" id="rev-count"></div>
    </div>
    <div class="review-list" id="review-list">
      <div class="rev-empty">目前還沒有留言，快來留第一則吧！</div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">
    <div id="rev-login-area">
      <button class="btn-discord" id="btn-discord-login">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        用 Discord 帳號登入來新增留言
      </button>
    </div>
    <div id="rev-form-area" style="display:none;">
      <div class="discord-user">
        <div id="rev-user-avatar"></div>
        <div class="discord-info">
          <div class="discord-name" id="rev-user-name"></div>
          <div class="discord-tag">Discord 帳號</div>
        </div>
        <button class="discord-logout" id="btn-discord-logout">登出</button>
      </div>
      <div class="star-input">
        <input type="radio" name="star" id="s5" value="5"><label for="s5">★</label>
        <input type="radio" name="star" id="s4" value="4"><label for="s4">★</label>
        <input type="radio" name="star" id="s3" value="3"><label for="s3">★</label>
        <input type="radio" name="star" id="s2" value="2"><label for="s2">★</label>
        <input type="radio" name="star" id="s1" value="1"><label for="s1">★</label>
      </div>
      <textarea id="rev-text" placeholder="說說你的感受..." maxlength="100" rows="3" style="margin-bottom:4px;width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);outline:none;resize:vertical;"></textarea>
      <div class="err" id="rev-err"></div>
      <button class="btn btn-primary" id="btn-submit-review">送出留言</button>
    </div>
  </div>
</div>

<!-- 選座位 -->
<div class="screen" id="screen-seat">
  <div class="card">
    <h2>選擇你的房間</h2>
    <p id="seat-hint" style="margin-bottom:12px;"></p>
    <div class="seats">
      <button class="seat-btn seat-0" id="sb-0" onclick="takeSeat(0)">藍色1</button>
      <button class="seat-btn seat-1" id="sb-1" onclick="takeSeat(1)">橘色2</button>
      <button class="seat-btn seat-2" id="sb-2" onclick="takeSeat(2)">綠色3</button>
      <button class="seat-btn seat-3" id="sb-3" onclick="takeSeat(3)">紫色4</button>
    </div>
    <button class="btn btn-secondary" style="margin-top:14px;" onclick="goHome()">返回</button>
  </div>
</div>

<!-- 遊戲 -->
<div class="screen" id="screen-game">
  <div class="status-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="my-tag" class="my-tag"></span>
      <span id="room-code-display" style="font-family:monospace;font: size 14px;color:grey;letter-spacing:.1em;font: weight bold;"></span>
      <div class="dots">
        <div class="dot dot-0" id="dot-0"></div>
        <div class="dot dot-1" id="dot-1"></div>
        <div class="dot dot-2" id="dot-2"></div>
        <div class="dot dot-3" id="dot-3"></div>
      </div>
    </div>
    <span class="prog" id="prog">0/10</span>
    <button class="leave-btn" onclick="leaveGame()">離開</button>
  </div>
  <div class="col-headers">
    <div></div>
    <div class="col-h col-h-0" id="col-h-0">藍色</div>
    <div class="col-h col-h-1" id="col-h-1">橘色</div>
    <div class="col-h col-h-2" id="col-h-2">綠色</div>
    <div class="col-h col-h-3" id="col-h-3">紫色</div>
  </div>
  <div class="floor-table" id="floor-table"></div>
  <div class="bottom-bar">
    <button onclick="confirmReset()">重置樓層（下一場）</button>
    <button onclick="copyCode()">複製房間代碼</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, onDisconnect, remove, serverTimestamp, push, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXHe3XoVjq56zVzBQVMb-a0pxrIT472iw",
  authDomain: "yourmotherpork-a0d57.firebaseapp.com",
  databaseURL: "https://yourmotherpork-a0d57-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yourmotherpork-a0d57",
  storageBucket: "yourmotherpork-a0d57.firebasestorage.app",
  messagingSenderId: "745700518720",
  appId: "1:745700518720:web:e910627e5a8c87a9e4e8a5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const FLOORS = 10;
const roomNames = ['藍色','橘色','綠色','紫色'];
let myRoom = null;
let roomCode = null;
let isHost = false;
let unsubscribe = null;
let correct = Array.from({length:FLOORS},()=>Array(4).fill(null));
let online = Array(4).fill(false);

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  document.getElementById('review-wrap').style.display = id === 'screen-home' ? '' : 'none';
}
function randCode() {
  const chars = '0123456789';
  return Array.from({length:4},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}
function updateSeatButtons(onlineArr) {
  for (let r=0;r<4;r++) {
    const btn = document.getElementById('sb-'+r);
    if (onlineArr[r]) { btn.classList.add('taken'); btn.disabled=true; }
    else { btn.classList.remove('taken'); btn.disabled=false; }
  }
}

window.createRoom = async function() {
  let code;
  for (let i=0;i<10;i++) {
    code = randCode();
    const snap = await get(ref(db,`rooms/${code}`));
    if (!snap.exists()) break;
  }
  roomCode = code;
  isHost = true;
  await set(ref(db,`rooms/${code}`), { createdAt: serverTimestamp(), online:[false,false,false,false], floors:null });
  document.getElementById('seat-hint').innerHTML =
    `房間代碼：<b style="font-family:monospace;font-size:16px;letter-spacing:.1em;color:var(--text)">${code}</b><br><span style="font-size:11px;color:var(--muted)">按照進入的房間 由左到右 選擇1234</span>`;
  updateSeatButtons([false,false,false,false]);
  showScreen('screen-seat');
}

window.joinRoom = async function() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const errEl = document.getElementById('join-err');
  errEl.textContent = '';
  if (code.length !== 4) { errEl.textContent = '請輸入四位代碼'; return; }
  const snap = await get(ref(db,`rooms/${code}`));
  if (!snap.exists()) { errEl.textContent = '找不到房間啦，是在亂打什麼代碼'; return; }
  roomCode = code;
  isHost = false;
  const data = snap.val();
  const onlineArr = data.online || [false,false,false,false];
  document.getElementById('seat-hint').innerHTML =
    `加入房間：<b style="font-family:monospace;font-size:16px;letter-spacing:.1em;color:var(--text)">${code}</b>`;
  updateSeatButtons(onlineArr);
  showScreen('screen-seat');
}

window.takeSeat = async function(r) {
  const snap = await get(ref(db,`rooms/${roomCode}/online/${r}`));
  if (snap.val()) { showToast('剛剛被人搶走了！'); return; }
  myRoom = r;

  const onlineRef = ref(db,`rooms/${roomCode}/online/${r}`);
  await set(onlineRef, true);
  onDisconnect(onlineRef).set(false);

  

  unsubscribe = onValue(ref(db,`rooms/${roomCode}`), snap => {
    const data = snap.val();
    if (!data) { showToast('房主關閉了房間'); goHome(); return; }
    for (let f=0;f<FLOORS;f++)
      for (let s=0;s<4;s++)
        correct[f][s] = (data.floors&&data.floors[f]&&data.floors[f][s]!=null) ? data.floors[f][s] : null;
    for (let s=0;s<4;s++) online[s] = !!(data.online&&data.online[s]);
    renderGame();
    updateSeatButtons(online);
  });

  const tag = document.getElementById('my-tag');
  tag.textContent = '我是 '+roomNames[r];
  tag.className = 'my-tag my-tag-'+r;
  document.getElementById('room-code-display').textContent = "房間代碼："+roomCode;
  document.getElementById('col-h-'+r).classList.add('mine');
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
  showScreen('screen-game');
}

window.leaveGame = async function() {
  if (unsubscribe) { unsubscribe(); unsubscribe=null; }
  if (myRoom !== null) {
    const onlineRef = ref(db,`rooms/${roomCode}/online/${myRoom}`);
    await onDisconnect(onlineRef).cancel();
    await set(onlineRef, false);
  }
  if (isHost) await remove(ref(db,`rooms/${roomCode}`));
  resetState();
  goHome();
}

window.goHome = function() {
  resetState();
  document.getElementById('join-code').value = '';
  document.getElementById('join-err').textContent = '';
  showScreen('screen-home');
}

function resetState() {
  myRoom=null; roomCode=null; isHost=false;
  correct=Array.from({length:FLOORS},()=>Array(4).fill(null));
  online=Array(4).fill(false);
  for (let r=0;r<4;r++) document.getElementById('col-h-'+r).classList.remove('mine');
}

window.handleClick = function(f,r,n) {
  if (r!==myRoom) return;
  const newVal = correct[f][r]===n ? null : n;
  set(ref(db,`rooms/${roomCode}/floors/${f}/${r}`), newVal);
}

window.confirmReset = function() {
  if (!confirm('重置所有樓層？（全員共用）')) return;
  set(ref(db,`rooms/${roomCode}/floors`), null);
  showToast('已重置！');
}

window.copyCode = function() {
  navigator.clipboard.writeText(roomCode).then(()=>showToast('代碼已複製：'+roomCode));
}

function renderGame() {
  for (let r=0;r<4;r++) {
    const dot = document.getElementById('dot-'+r);
    online[r] ? dot.classList.add('on') : dot.classList.remove('on');
  }
  let done = correct.filter(row=>row.every(v=>v!==null)).length;
  document.getElementById('prog').textContent = done+'/10';

  const table = document.getElementById('floor-table');
  table.innerHTML='';
  for (let f=0;f<FLOORS;f++) {
    const used = new Set(correct[f].filter(v=>v!==null));
    const allDone = correct[f].every(v=>v!==null);
    const row = document.createElement('div');
    row.className='floor-row'+(allDone?' done-row':'');
    const lbl = document.createElement('div');
    lbl.className='floor-num';
    lbl.textContent=(FLOORS-f)+'F';
    row.appendChild(lbl);
    for (let r=0;r<4;r++) {
      const cell = document.createElement('div');
      cell.className='room-cell room-cell-'+r+(r!==myRoom?' not-mine':'');
      for (let n=1;n<=4;n++) {
        const btn = document.createElement('button');
        btn.className='plat-btn';
        btn.textContent=n;
        if (correct[f][r]===n) btn.classList.add('correct');
        else if (correct[f][r]!==null||used.has(n)) btn.classList.add('elim');
        if (r===myRoom) {
          btn.addEventListener('click',()=>{
            if (!btn.classList.contains('elim')||correct[f][r]===n) handleClick(f,r,n);
          });
        }
        cell.appendChild(btn);
      }
      row.appendChild(cell);
    }
    table.appendChild(row);
  }
  applyGridLayout();
}

function applyGridLayout() {
  if (myRoom === null) return;
  const cols = [1,1,1,1];
  cols[myRoom] = 3;
  const colStr = `28px ${cols.map(c=>c+'fr').join(' ')}`;
  document.querySelector('.col-headers').style.gridTemplateColumns = colStr;
  document.querySelectorAll('.floor-row').forEach(row => {
    row.style.gridTemplateColumns = colStr;
  });
  for (let r=0;r<4;r++) {
    const isSmall = r !== myRoom;
    document.querySelectorAll('.room-cell-'+r+' .plat-btn').forEach(btn => {
      btn.classList.toggle('small-mode', isSmall);
    });
    const colH = document.getElementById('col-h-'+r);
    if (colH) colH.classList.toggle('small-mode', isSmall);
  }
}

// ===== Discord OAuth =====
const DISCORD_CLIENT_ID = '1484561056553767134';
const DISCORD_REDIRECT = 'https://nsysu187-ship-it.github.io/YourMotherPork/';

let discordUser = null;

function discordLogin() {
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('discord_state', state);
  const url = `https://discord.com/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(DISCORD_REDIRECT)}&response_type=token&scope=identify&state=${state}`;
  window.location.href = url;
}

function discordLogout() {
  discordUser = null;
  sessionStorage.removeItem('discord_user');
  updateRevUI();
}

async function handleDiscordCallback() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  if (!token) return;
  history.replaceState(null, '', window.location.pathname);
  try {
    const res = await fetch('https://discord.com/api/users/@me', {
      headers: { Authorization: `Bearer ${token}` }
    });
    const user = await res.json();
    discordUser = {
      id: user.id,
      username: user.global_name || user.username,
      avatar: user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=64` : null
    };
    sessionStorage.setItem('discord_user', JSON.stringify(discordUser));
    updateRevUI();
    showToast('Discord 登入成功！歡迎 ' + discordUser.username);
  } catch(e) {
    showToast('登入失敗，請再試一次');
  }
}

function loadDiscordSession() {
  const saved = sessionStorage.getItem('discord_user');
  if (saved) { try { discordUser = JSON.parse(saved); } catch(e) {} }
}

function updateRevUI() {
  const loginArea = document.getElementById('rev-login-area');
  const formArea = document.getElementById('rev-form-area');
  if (discordUser) {
    loginArea.style.display = 'none';
    formArea.style.display = 'block';
    document.getElementById('rev-user-name').textContent = discordUser.username;
    const avatarEl = document.getElementById('rev-user-avatar');
    if (discordUser.avatar) {
      avatarEl.innerHTML = `<img class="discord-avatar" src="${discordUser.avatar}" alt="">`;
    } else {
      avatarEl.innerHTML = `<div class="discord-avatar-placeholder">${discordUser.username.charAt(0).toUpperCase()}</div>`;
    }
  } else {
    loginArea.style.display = 'block';
    formArea.style.display = 'none';
  }
}

// ===== 留言系統 =====
const reviewsRef = ref(db, 'reviews');

onValue(reviewsRef, snap => {
  console.log('snap exists:', snap.exists());
  console.log('snap val:', JSON.stringify(snap.val()));
  const list = document.getElementById('review-list');
  const avgWrap = document.getElementById('rev-avg');
  if (!snap.exists()) {
    list.innerHTML = '<div class="rev-empty">目前還沒有留言，快來留第一則吧！</div>';
    avgWrap.style.display = 'none';
    return;
  }
  const items = [];
  snap.forEach(child => {
    console.log('child key:', child.key, 'val:', JSON.stringify(child.val()));
    items.push(child.val());
  });
  console.log('before reverse:', items.length);
  items.reverse();
  console.log('after reverse:', items.length);

  const total = items.reduce((s, r) => s + r.stars, 0);
  const avg = (total / items.length).toFixed(1);
  const fullStars = Math.round(total / items.length);
  document.getElementById('rev-avg-stars').textContent = '★'.repeat(fullStars) + '☆'.repeat(5 - fullStars);
  document.getElementById('rev-avg-num').textContent = avg;
  document.getElementById('rev-count').textContent = `（${items.length} 則留言）`;
  avgWrap.style.display = 'flex';
  console.log('items count:', items.length, items);
  list.innerHTML = items.map(r => {
    const stars = '★'.repeat(r.stars) + '☆'.repeat(5 - r.stars);
    const d = new Date(r.ts);
    const timeStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const avatarHtml = r.avatar
      ? `<img class="rev-avatar" src="${escHtml(r.avatar)}" alt="">`
      : `<div class="rev-avatar-placeholder">${escHtml(r.name.charAt(0).toUpperCase())}</div>`;
    return `<div class="review-item">
      <div class="rev-header">
        ${avatarHtml}
        <span class="rev-name">${escHtml(r.name)}</span>
        <span class="rev-stars">${stars}</span>
      </div>
      <div class="rev-text">${escHtml(r.text)}</div>
      <div class="rev-time">${timeStr}</div>
    </div>`;
  }).join('');
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function submitReview() {
  if (!discordUser) { showToast('請先用 Discord 登入'); return; }
  const text = document.getElementById('rev-text').value.trim();
  const starEl = document.querySelector('input[name="star"]:checked');
  const errEl = document.getElementById('rev-err');
  errEl.textContent = '';
  if (!starEl) { errEl.textContent = '請選擇星數'; return; }
  if (!text) { errEl.textContent = '請輸入留言內容'; return; }
  await push(ref(db, 'reviews'), {
    name: discordUser.username,
    avatar: discordUser.avatar || null,
    stars: parseInt(starEl.value),
    text,
    ts: Date.now()
  });
  document.getElementById('rev-text').value = '';
  document.querySelectorAll('input[name="star"]').forEach(r => r.checked = false);
  showToast('留言送出成功！⭐');
}

// 初始化：用 addEventListener 避免 module scope 問題
loadDiscordSession();
updateRevUI();
handleDiscordCallback();
document.getElementById('btn-discord-login').addEventListener('click', discordLogin);
document.getElementById('btn-discord-logout').addEventListener('click', discordLogout);
document.getElementById('btn-submit-review').addEventListener('click', submitReview);
</script>
